<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⚽ W杯2026 予想バトル</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: {
      wc: { green: '#006633', gold: '#FFD700', red: '#C8102E' }
    }}}
  }
</script>
<style>
  body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; }
  .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
  .btn-primary { background: linear-gradient(135deg, #006633, #009933); }
  .btn-primary:hover { background: linear-gradient(135deg, #004d26, #007326); }
  .odds-badge { background: linear-gradient(135deg, #7c3aed, #4f46e5); }
  .payout-badge { background: linear-gradient(135deg, #d97706, #f59e0b); }
  select { background-color: #1e293b; color: white; border-color: #334155; }
  select option { background-color: #1e293b; }
  input[type=number] { background-color: #1e293b; color: white; border-color: #334155; }
  .tab-active { border-bottom: 3px solid #FFD700; color: #FFD700; }
</style>
</head>
<body class="text-white font-sans">

<!-- 楽天オッズティッカー -->
<div id="odds-ticker-bar" class="bg-black border-b border-yellow-900 border-opacity-50 py-1.5 overflow-hidden hidden">
  <div class="flex items-center gap-3">
    <span class="shrink-0 bg-yellow-600 text-black text-xs font-black px-2 py-0.5 ml-3 rounded">LIVE ODDS</span>
    <div class="ticker-wrapper overflow-hidden flex-1">
      <div id="odds-ticker-content" class="ticker-inner flex gap-8 text-sm whitespace-nowrap"></div>
    </div>
  </div>
</div>
<style>
.ticker-wrapper { position: relative; }
.ticker-inner { display: inline-flex; animation: ticker-scroll 60s linear infinite; }
.ticker-inner:hover { animation-play-state: paused; }
@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
</style>

<nav class="bg-black bg-opacity-40 border-b border-white border-opacity-10 px-4 py-3">
  <div class="max-w-4xl mx-auto flex items-center justify-between">
    <a href="/" class="text-xl font-bold">⚽ W杯2026 予想バトル</a>
    <div class="flex gap-3 items-center text-sm">
      <a href="/matches" class="text-gray-300 hover:text-white font-semibold">📺 速報</a>
      {% if participant %}
      <span class="text-green-400 font-semibold">👤 {{ participant.name }}</span>
      <a href="/logout" class="text-gray-400 hover:text-white">ログアウト</a>
      {% endif %}
      <a href="/admin" class="text-gray-500 hover:text-gray-300 text-xs">管理</a>
    </div>
  </div>
</nav>

<main class="max-w-4xl mx-auto px-4 py-6">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-gray-600 text-xs py-4">
  パリミュチュエル方式 — 胴元なし・完全公平分配
</footer>

<script>
async function loadOddsTicker() {
  try {
    const res = await fetch('/api/rakuten-odds');
    const d = await res.json();
    if (!d.odds || !d.odds.length) return;

    const bar = document.getElementById('odds-ticker-bar');
    const content = document.getElementById('odds-ticker-content');
    if (!bar || !content) return;

    // オッズ順（低い=人気）でソート
    const sorted = [...d.odds].sort((a, b) => a.odds - b.odds);

    // 1セット分のHTML
    const makeItems = () => sorted.map(item => {
      const color = item.odds <= 5 ? 'text-yellow-400' :
                    item.odds <= 15 ? 'text-green-400' :
                    item.odds <= 50 ? 'text-blue-400' : 'text-gray-400';
      return `<span class="flex items-center gap-1.5">
        <span class="text-gray-300 font-medium">${item.name}</span>
        <span class="${color} font-black">${item.odds}倍</span>
        <span class="text-gray-700">|</span>
      </span>`;
    }).join('');

    // 無限スクロールのため2セット分を並べる
    content.innerHTML = makeItems() + makeItems();

    // 幅に合わせてアニメーション速度を調整
    const totalWidth = content.scrollWidth / 2;
    const speed = Math.max(40, totalWidth / 8); // px/s
    content.style.animationDuration = `${speed}s`;

    bar.classList.remove('hidden');
  } catch(e) { console.error('ticker error', e); }
}

loadOddsTicker();
setInterval(loadOddsTicker, 5 * 60 * 1000);
</script>
</body>
</html>
