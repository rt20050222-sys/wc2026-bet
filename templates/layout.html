<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⚽ W杯2026 予想バトル</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; }
  .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
  .btn-primary { background: linear-gradient(135deg, #006633, #009933); }
  .btn-primary:hover { background: linear-gradient(135deg, #004d26, #007326); }
  select { background-color: #1e293b; color: white; border-color: #334155; }
  select option { background-color: #1e293b; }
  input[type=number] { background-color: #1e293b; color: white; border-color: #334155; }
  .tab-active { border-bottom: 3px solid #FFD700; color: #FFD700; }

  /* サイドバー縦スクロールティッカー */
  .odds-scroll-wrap {
    height: 320px;
    overflow: hidden;
    position: relative;
  }
  .odds-scroll-inner {
    display: flex;
    flex-direction: column;
    animation: scroll-up 30s linear infinite;
  }
  .odds-scroll-wrap:hover .odds-scroll-inner { animation-play-state: paused; }
  @keyframes scroll-up {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-50%); }
  }

  /* サイドバーレイアウト */
  .page-layout {
    display: flex;
    gap: 1.25rem;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
    align-items: flex-start;
  }
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    position: sticky;
    top: 1rem;
  }
  .main-content { flex: 1; min-width: 0; }

  @media (max-width: 900px) {
    .page-layout { flex-direction: column; }
    .sidebar { width: 100%; position: static; }
  }
</style>
</head>
<body class="text-white font-sans">

<nav class="bg-black bg-opacity-40 border-b border-white border-opacity-10 px-4 py-3">
  <div class="max-w-screen-xl mx-auto flex items-center justify-between">
    <a href="/" class="text-xl font-bold">⚽ W杯2026 予想バトル</a>
    <div class="flex gap-3 items-center text-sm">
      <a href="/matches" class="text-gray-300 hover:text-white font-semibold">📺 速報</a>
      {% if participant %}
      <span class="text-green-400 font-semibold">👤 {{ participant.name }}</span>
      <a href="/logout" class="text-gray-400 hover:text-white">ログアウト</a>
      {% endif %}
      <a href="/admin" class="text-gray-500 hover:text-gray-300 text-xs">管理</a>
    </div>
  </div>
</nav>

<div class="page-layout">

  <!-- ── 左サイドバー ── -->
  <aside class="sidebar space-y-4">

    <!-- 楽天WINNERオッズ -->
    <div class="card rounded-2xl overflow-hidden">
      <div class="bg-gradient-to-r from-yellow-900 to-yellow-800 px-3 py-2 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-yellow-400 font-black text-xs">📊 LIVE ODDS</span>
        </div>
        <span class="text-yellow-600 text-xs" id="odds-updated">--</span>
      </div>
      <div class="p-2">
        <div id="odds-loading" class="text-gray-500 text-xs text-center py-8">読み込み中...</div>
        <div class="odds-scroll-wrap hidden" id="odds-scroll-wrap">
          <div class="odds-scroll-inner" id="odds-scroll-inner"></div>
        </div>
        <p class="text-gray-700 text-xs text-center mt-1">楽天WINNER 優勝オッズ</p>
      </div>
    </div>

    <!-- 歴代W杯結果 -->
    <div class="card rounded-2xl overflow-hidden">
      <div class="bg-gradient-to-r from-blue-900 to-blue-800 px-3 py-2">
        <span class="text-blue-300 font-black text-xs">🏆 歴代W杯 (1930〜2022)</span>
      </div>
      <div class="p-2 max-h-80 overflow-y-auto" id="history-list">
        <div class="text-gray-500 text-xs text-center py-4">読み込み中...</div>
      </div>
    </div>

  </aside>

  <!-- ── メインコンテンツ ── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

</div>

<footer class="text-center text-gray-600 text-xs py-4">
  パリミュチュエル方式 — 胴元なし・完全公平分配
</footer>

<script>
// ── 楽天WINNERオッズ（サーバー経由） ─────────────────────────
async function loadSidebarOdds() {
  try {
    const res = await fetch('/api/rakuten-odds');
    if (!res.ok) throw new Error('server error');
    const d = await res.json();
    if (d.error || !d.odds || !d.odds.length) throw new Error('no data');
    renderOdds(d.odds, d.updated_at);
  } catch(e) {
    // サーバー失敗 → クライアント直接取得を試みる
    fetchOddsClientSide();
  }
}

async function fetchOddsClientSide() {
  document.getElementById('odds-loading').innerHTML =
    '<div class="text-center py-4 text-xs text-gray-500">' +
    '⚠️ オッズ未設定<br>' +
    '<a href="/admin" class="text-blue-400 underline">管理画面</a>でThe Odds APIキーを登録してください' +
    '</div>';
}

function renderOdds(odds, updatedAt) {
  // name_ja があれば日本語名を使用
  const sorted = [...odds].sort((a, b) => a.odds - b.odds)
    .map(o => ({...o, display: o.name_ja || o.name}));

  const rowHtml = (item) => {
    const color = item.odds <= 5  ? '#FFD700' :
                  item.odds <= 15 ? '#4ade80' :
                  item.odds <= 50 ? '#60a5fa' : '#6b7280';
    const bg    = item.odds <= 5  ? 'rgba(255,215,0,0.08)' : 'transparent';
    return `<div style="background:${bg}" class="flex items-center justify-between px-2 py-1.5 rounded-lg mb-0.5">
      <span class="text-xs font-medium text-gray-300">${item.display || item.name}</span>
      <span class="text-xs font-black ml-2" style="color:${color}">${item.odds}倍</span>
    </div>`;
  };

  // 無限スクロール用に2セット
  const html = sorted.map(rowHtml).join('') + sorted.map(rowHtml).join('');

  const inner = document.getElementById('odds-scroll-inner');
  const wrap  = document.getElementById('odds-scroll-wrap');
  const loading = document.getElementById('odds-loading');
  if (!inner || !wrap) return;

  inner.innerHTML = html;
  loading.classList.add('hidden');
  wrap.classList.remove('hidden');

  // 行数に合わせてアニメーション速度
  const speed = Math.max(20, sorted.length * 1.2);
  inner.style.animationDuration = `${speed}s`;

  if (updatedAt) {
    try {
      const jst = new Date(new Date(updatedAt).getTime() + 9*3600000);
      document.getElementById('odds-updated').textContent =
        jst.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) + ' JST';
    } catch {}
  }
}

// ── 歴代W杯 ──────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch('/api/wc-history');
    const data = await res.json();
    const reversed = [...data].reverse();
    document.getElementById('history-list').innerHTML =
      reversed.map((r, i) => `
        <div class="flex items-center gap-1 py-1 ${i < reversed.length-1 ? 'border-b border-gray-800' : ''}">
          <span class="text-gray-600 text-xs w-10 shrink-0">${r.year}</span>
          <div class="text-xs leading-tight">
            <span class="text-yellow-400 font-bold">${r.first}</span>
            <span class="text-gray-600 mx-0.5">/</span>
            <span class="text-gray-400">${r.second}</span>
            <span class="text-gray-600 mx-0.5">/</span>
            <span class="text-gray-500">${r.third}</span>
          </div>
        </div>`).join('');
  } catch(e) {
    document.getElementById('history-list').textContent = '読み込み失敗';
  }
}

loadSidebarOdds();
loadHistory();
setInterval(loadSidebarOdds, 5 * 60 * 1000);
</script>
</body>
</html>
