<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" id="viewport-meta">
<title>⚽ W杯2026 予想バトル</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; }
  .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
  .btn-primary { background: linear-gradient(135deg, #006633, #009933); }
  .btn-primary:hover { background: linear-gradient(135deg, #004d26, #007326); }
  select { background-color: #1e293b; color: white; border-color: #334155; }
  select option { background-color: #1e293b; }
  input[type=number] { background-color: #1e293b; color: white; border-color: #334155; }
  .tab-active { border-bottom: 3px solid #FFD700; color: #FFD700; }

  /* サイドバー縦スクロールティッカー */
  .odds-scroll-wrap {
    height: 320px;
    overflow: hidden;
    position: relative;
  }
  .odds-scroll-inner {
    display: flex;
    flex-direction: column;
    animation: scroll-up 30s linear infinite;
  }
  .odds-scroll-wrap:hover .odds-scroll-inner { animation-play-state: paused; }
  @keyframes scroll-up {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-50%); }
  }

  /* サイドバーレイアウト */
  .page-layout {
    display: flex;
    gap: 1.25rem;
    max-width: 1280px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
    align-items: flex-start;
  }
  .sidebar-left {
    width: 260px;
    flex-shrink: 0;
    position: sticky;
    top: 1rem;
  }
  .sidebar-right {
    width: 240px;
    flex-shrink: 0;
    position: sticky;
    top: 1rem;
  }
  .main-content { flex: 1; min-width: 0; }

  /* タブレット：右サイドバーを隠す */
  @media (max-width: 1100px) {
    .sidebar-right { display: none; }
  }
  /* スマホ：両サイドバーを通常フロー、左サイドバーを最後に */
  @media (max-width: 750px) {
    .page-layout { flex-direction: column; }
    .sidebar-left  { width: 100%; position: static; order: 3; }
    .sidebar-right { display: block; width: 100%; position: static; order: 2; }
    .main-content { order: 1; }
  }
</style>
</head>
<body class="text-white font-sans">

<nav class="bg-black bg-opacity-40 border-b border-white border-opacity-10 px-4 py-3">
  <div class="max-w-screen-xl mx-auto flex items-center justify-between">
    <a href="/" class="text-xl font-bold">⚽ W杯2026 予想バトル</a>
    <div class="flex gap-3 items-center text-sm">
      <a href="/matches" class="text-gray-300 hover:text-white font-semibold">📺 速報</a>
      <a href="/odds" class="text-gray-300 hover:text-white font-semibold">📊 オッズ</a>
      {% if participant %}
      <span class="text-green-400 font-semibold">👤 {{ participant.name }}</span>
      <a href="/logout" class="text-gray-400 hover:text-white">ログアウト</a>
      {% endif %}
      <button id="pc-mode-btn" onclick="togglePCMode()"
        class="text-xs border border-gray-600 hover:border-gray-400 px-2 py-1 rounded text-gray-400 hover:text-white transition">
        🖥 PC版
      </button>
      <a href="/admin" class="text-gray-500 hover:text-gray-300 text-xs">管理</a>
    </div>
  </div>
</nav>

<div class="page-layout">

  <!-- ── 左サイドバー ── -->
  <aside class="sidebar-left space-y-4">

    <!-- 楽天WINNERオッズ -->
    <div class="card rounded-2xl overflow-hidden">
      <div class="bg-gradient-to-r from-yellow-900 to-yellow-800 px-3 py-2 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-yellow-400 font-black text-xs">📊 LIVE ODDS</span>
        </div>
        <span class="text-yellow-600 text-xs" id="odds-updated">--</span>
      </div>
      <div class="p-2">
        <div id="odds-loading" class="text-gray-500 text-xs text-center py-8">読み込み中...</div>
        <div class="odds-scroll-wrap hidden" id="odds-scroll-wrap">
          <div class="odds-scroll-inner" id="odds-scroll-inner"></div>
        </div>
        <a href="/odds" class="block text-center text-blue-400 text-xs mt-1 hover:underline">全48チームを見る →</a>
      </div>
    </div>

    <!-- 歴代W杯結果 -->
    <div class="card rounded-2xl overflow-hidden">
      <div class="bg-gradient-to-r from-blue-900 to-blue-800 px-3 py-2">
        <span class="text-blue-300 font-black text-xs">🏆 歴代W杯 (1930〜2022)</span>
      </div>
      <div class="p-2 max-h-80 overflow-y-auto" id="history-list">
        <div class="text-gray-500 text-xs text-center py-4">読み込み中...</div>
      </div>
    </div>

  </aside>

  <!-- ── メインコンテンツ ── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── 右サイドバー（今日の試合＋ニュース） ── -->
  <aside class="sidebar-right space-y-3">

    <!-- 今日の試合 -->
    <div class="card rounded-2xl overflow-hidden">
      <div class="bg-gradient-to-r from-red-900 to-red-800 px-3 py-2 flex items-center justify-between">
        <span class="text-red-300 font-black text-xs">⚽ 今日の試合</span>
        <span class="text-red-600 text-xs" id="today-match-updated">--</span>
      </div>
      <div class="p-2 space-y-1" id="today-matches-sidebar">
        <div class="text-gray-500 text-xs text-center py-6">読み込み中...</div>
      </div>
    </div>

    <!-- W杯ニュース -->
    <div class="card rounded-2xl overflow-hidden">
      <div class="bg-gradient-to-r from-indigo-900 to-indigo-800 px-3 py-2 flex items-center justify-between">
        <span class="text-indigo-300 font-black text-xs">📰 W杯最新ニュース</span>
        <span class="text-indigo-700 text-xs" id="news-updated">--</span>
      </div>
      <div class="p-2 space-y-1" id="news-sidebar">
        <div class="text-gray-500 text-xs text-center py-6">読み込み中...</div>
      </div>
    </div>

  </aside>

</div>

<footer class="text-center text-gray-600 text-xs py-4">
  パリミュチュエル方式 — 胴元なし・完全公平分配
</footer>

<script>
// ── 楽天WINNERオッズ（サーバー経由） ─────────────────────────
async function loadSidebarOdds() {
  try {
    const res = await fetch('/api/rakuten-odds');
    const d = await res.json();
    if (!d.odds || !d.odds.length) throw new Error('no data');
    renderOdds(d.odds, d.updated_at);
  } catch(e) {
    document.getElementById('odds-loading').textContent = '読み込み失敗';
  }
}

function renderOdds(odds, updatedAt) {
  // name_ja があれば日本語名を使用
  const sorted = [...odds].sort((a, b) => a.odds - b.odds)
    .map(o => ({...o, display: o.name_ja || o.name}));

  const rowHtml = (item) => {
    const color = item.odds <= 5  ? '#FFD700' :
                  item.odds <= 15 ? '#4ade80' :
                  item.odds <= 50 ? '#60a5fa' : '#6b7280';
    const bg    = item.odds <= 5  ? 'rgba(255,215,0,0.08)' : 'transparent';
    return `<div style="background:${bg}" class="flex items-center justify-between px-2 py-1.5 rounded-lg mb-0.5">
      <span class="text-xs font-medium text-gray-300">${item.display || item.name}</span>
      <span class="text-xs font-black ml-2" style="color:${color}">${item.odds}倍</span>
    </div>`;
  };

  // 無限スクロール用に2セット
  const html = sorted.map(rowHtml).join('') + sorted.map(rowHtml).join('');

  const inner = document.getElementById('odds-scroll-inner');
  const wrap  = document.getElementById('odds-scroll-wrap');
  const loading = document.getElementById('odds-loading');
  if (!inner || !wrap) return;

  inner.innerHTML = html;
  loading.classList.add('hidden');
  wrap.classList.remove('hidden');

  // 行数に合わせてアニメーション速度
  const speed = Math.max(20, sorted.length * 1.2);
  inner.style.animationDuration = `${speed}s`;

  if (updatedAt) {
    try {
      const jst = new Date(new Date(updatedAt).getTime() + 9*3600000);
      document.getElementById('odds-updated').textContent =
        jst.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) + ' JST';
    } catch {}
  }
}

// ── 歴代W杯 ──────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch('/api/wc-history');
    const data = await res.json();
    const reversed = [...data].reverse();
    document.getElementById('history-list').innerHTML =
      reversed.map((r, i) => `
        <div class="flex items-center gap-1 py-1 ${i < reversed.length-1 ? 'border-b border-gray-800' : ''}">
          <span class="text-gray-600 text-xs w-10 shrink-0">${r.year}</span>
          <div class="text-xs leading-tight">
            <span class="text-yellow-400 font-bold">${r.first}</span>
            <span class="text-gray-600 mx-0.5">/</span>
            <span class="text-gray-400">${r.second}</span>
            <span class="text-gray-600 mx-0.5">/</span>
            <span class="text-gray-500">${r.third}</span>
          </div>
        </div>`).join('');
  } catch(e) {
    document.getElementById('history-list').textContent = '読み込み失敗';
  }
}

// ── 今日の試合（右サイドバー） ────────────────────────────
async function loadTodayMatches() {
  const el = document.getElementById('today-matches-sidebar');
  const updEl = document.getElementById('today-match-updated');
  if (!el) return;

  try {
    const res = await fetch('/api/matches');
    const d = await res.json();
    if (d.error || !d.matches) throw new Error('no data');

    // JSTで今日の日付
    const jstNow = new Date(Date.now() + 9 * 3600 * 1000);
    const today = jstNow.toISOString().slice(5, 10).replace('-', '/'); // MM/DD

    const live     = d.matches.filter(m => m.status_raw === 'IN_PLAY' || m.status_raw === 'PAUSED');
    const todayAll = d.matches.filter(m => m.kick_off_jst && m.kick_off_jst.startsWith(today));
    const finished = d.matches.filter(m => m.status_raw === 'FINISHED')
                               .slice(-5).reverse();
    const upcoming = d.matches.filter(m => m.status_raw === 'TIMED' || m.status_raw === 'SCHEDULED')
                               .slice(0, 5);

    const show = live.length ? live :
                 todayAll.length ? todayAll :
                 [...finished.slice(0, 3), ...upcoming.slice(0, 3)];

    if (!show.length) {
      el.innerHTML = '<div class="text-gray-600 text-xs text-center py-4">試合情報なし</div>';
      return;
    }

    el.innerHTML = show.map(m => {
      const isLive = m.status_raw === 'IN_PLAY' || m.status_raw === 'PAUSED';
      const isDone = m.status_raw === 'FINISHED';
      const hasScore = m.home_score !== null && m.home_score !== undefined;

      const homeWin = hasScore && m.home_score > m.away_score;
      const awayWin = hasScore && m.away_score > m.home_score;

      const statusHtml = isLive
        ? `<span class="text-red-400 text-xs font-bold" style="animation:pulse 1.5s infinite">🔴</span>`
        : isDone ? `<span class="text-gray-600 text-xs">終了</span>`
        : `<span class="text-blue-400 text-xs">${m.kick_off_jst.split(' ')[1] || '--:--'}</span>`;

      const scoreHtml = hasScore
        ? `<span class="${homeWin ? 'text-yellow-400 font-black' : 'text-gray-300'}">${m.home_score}</span>
           <span class="text-gray-600 mx-0.5">-</span>
           <span class="${awayWin ? 'text-yellow-400 font-black' : 'text-gray-300'}">${m.away_score}</span>`
        : `<span class="text-gray-600">vs</span>`;

      // グループ表示
      const group = m.group ? m.group.replace('GROUP_', 'G') : m.stage.slice(0,6);

      return `<div class="card rounded-lg px-2 py-2 ${isLive ? 'border border-red-500 border-opacity-40' : ''}">
        <div class="flex items-center justify-between mb-1">
          <span class="text-gray-600 text-xs">${group}</span>
          ${statusHtml}
        </div>
        <div class="flex items-center justify-between text-xs gap-1">
          <span class="font-semibold text-right flex-1 leading-tight ${homeWin ? 'text-yellow-400' : 'text-gray-200'}" style="font-size:0.68rem">${m.home}</span>
          <div class="flex items-center gap-0.5 shrink-0 font-bold text-sm">${scoreHtml}</div>
          <span class="font-semibold text-left flex-1 leading-tight ${awayWin ? 'text-yellow-400' : 'text-gray-200'}" style="font-size:0.68rem">${m.away}</span>
        </div>
      </div>`;
    }).join('');

    if (updEl) updEl.textContent = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});

  } catch(e) {
    el.innerHTML = '<div class="text-gray-600 text-xs text-center py-4">APIキー未設定<br><a href="/admin" class="text-blue-400 text-xs">管理画面で設定</a></div>';
  }
}

// ── PC版 / スマホ版 切り替え ──────────────────────────────
function applyPCMode(on) {
  const vm = document.getElementById('viewport-meta');
  const btn = document.getElementById('pc-mode-btn');
  if (on) {
    vm.content = 'width=1280';
    btn.textContent = '📱 スマホ版';
    btn.title = 'スマホ表示に戻す';
  } else {
    vm.content = 'width=device-width, initial-scale=1';
    btn.textContent = '🖥 PC版';
    btn.title = 'PC版レイアウトで表示';
  }
}

function togglePCMode() {
  const current = localStorage.getItem('pcMode') === '1';
  const next = !current;
  localStorage.setItem('pcMode', next ? '1' : '0');
  applyPCMode(next);
}

// ページ読み込み時に保存済み設定を復元
applyPCMode(localStorage.getItem('pcMode') === '1');

// ── W杯ニュース ───────────────────────────────────────────
async function loadNews() {
  const el = document.getElementById('news-sidebar');
  const upd = document.getElementById('news-updated');
  if (!el) return;
  try {
    const res = await fetch('/api/wc-news');
    const d = await res.json();
    if (!d.news || !d.news.length) throw new Error('no news');

    el.innerHTML = d.news.map(n => `
      <a href="${n.link}" target="_blank" rel="noopener"
        class="block card rounded-lg px-2 py-2 hover:bg-white hover:bg-opacity-10 transition group">
        <div class="text-xs font-medium text-gray-200 leading-tight group-hover:text-white line-clamp-3" style="-webkit-line-clamp:3;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;">
          ${n.title}
        </div>
        <div class="flex items-center justify-between mt-1">
          <span class="text-indigo-400 text-xs truncate max-w-24">${n.source || ''}</span>
          <span class="text-gray-600 text-xs shrink-0 ml-1">${n.pub || ''}</span>
        </div>
      </a>`).join('');

    if (upd) upd.textContent = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    if (el) el.innerHTML = '<div class="text-gray-600 text-xs text-center py-4">ニュース取得失敗</div>';
  }
}

loadSidebarOdds();
loadHistory();
loadTodayMatches();
loadNews();
setInterval(loadNews, 30 * 60 * 1000);
setInterval(loadSidebarOdds, 5 * 60 * 1000);
setInterval(loadTodayMatches, 5 * 60 * 1000);
</script>
</body>
</html>
